<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus_B2b - Dashboard Gestor</title>
  <style>
    :root { --bg:#0f172a; --card:#0b1220; --muted:#94a3b8; --brand:#22c55e; --danger:#ef4444; }
    body { margin:0; font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, Arial; background:#0a0f1a; color:#e2e8f0; }
    header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom: 1px solid #1e293b; position: sticky; top:0; background:#0a0f1a; }
    header .brand { font-weight:700; letter-spacing:.3px; }
    header nav a { color:#94a3b8; text-decoration:none; margin-left:14px; }
    .wrap { padding: 20px; }
    .grid { display:grid; gap:16px; grid-template-columns: 1fr 1fr; }
    .card { background:linear-gradient(180deg, #0b1220 0%, #0b1220cc 100%); border:1px solid #1e293b; border-radius:14px; padding:16px; }
    h2 { margin:0 0 10px 0; font-size:18px; }
    label { font-size:13px; color:#94a3b8; display:block; margin-top:10px; }
    input, select { width:100%; background:#0b1220; border:1px solid #1e293b; color:#e2e8f0; padding:10px; border-radius:10px; margin-top:6px; }
    input[required] { border-left: 3px solid #22c55e; }
    input:focus { outline: none; border-color: #22c55e; box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.1); }
    button { background:#22c55e; color:#052e13; border:0; padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:600; }
    button.secondary { background:#1f2937; color:#e2e8f0; }
    button.danger { background:#ef4444; color:#fff; }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { text-align:left; padding:10px; border-bottom:1px solid #1e293b; font-size:14px; }
    th { color:#94a3b8; font-weight:600; }
    .row { display:flex; align-items:center; gap:10px; }
    .muted { color:#94a3b8; font-size:12px; }
    .right { text-align:right; }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; }
    .pill.ok { background:#052e13; color:#22c55e; border:1px solid #16a34a; }
    .pill.bad { background:#3b0a0a; color:#ef4444; border:1px solid #b91c1c; }
  </style>
</head>
<body>
  <header>
    <div class="brand">Nexus_B2b • Dashboard Gestor</div>
    <nav>
      <a href="#" id="btnSair">Sair</a>
    </nav>
  </header>
  <div class="wrap">
    <div class="grid">
      <div class="card">
        <h2>Nova Equipe</h2>
        <label>Nome</label>
        <input id="nomeEquipe" placeholder="Ex: Equipe Centro" />
        <label>Limite Total (R$)</label>
        <input id="limiteEquipe" type="number" step="0.01" placeholder="0.00" />
        <div class="row" style="margin-top:12px;">
          <button id="btnCriar">Criar Equipe</button>
          <span id="statusCriar" class="muted"></span>
        </div>
        <div class="muted" style="margin-top:8px;">Saldo inicial = Limite Total</div>
      </div>

      <div class="card">
        <h2>Saldo da Equipe</h2>
        <label>Equipe</label>
        <select id="selEquipeSaldo"></select>
        <div style="margin-top:12px;" class="row">
          <button id="btnVerSaldo" class="secondary">Ver Saldo</button>
          <div id="saldoBox" class="muted"></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="row" style="justify-content:space-between;">
        <h2>Equipes</h2>
        <button id="btnRecarregar" class="secondary">Recarregar</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Limite</th>
            <th>Saldo</th>
            <th>Status</th>
            <th class="right">Ações</th>
          </tr>
        </thead>
        <tbody id="tbodyEquipes"></tbody>
      </table>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="row" style="justify-content:space-between;">
        <h2>Pedidos</h2>
        <div class="row">
          <label style="margin:0;">Status</label>
          <select id="selFiltroStatus">
            <option value="AGUARDANDO" selected>AGUARDANDO</option>
            <option value="ENVIADO">ENVIADO</option>
            <option value="APROVADO">APROVADO</option>
            <option value="CANCELADO">CANCELADO</option>
          </select>
          <button id="btnRecarregarPedidos" class="secondary">Recarregar</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Equipe</th>
            <th>Valor Total</th>
            <th>Data</th>
            <th>Status</th>
            <th class="right">Ações</th>
          </tr>
        </thead>
        <tbody id="tbodyPedidos"></tbody>
      </table>
      <div class="row" style="justify-content:space-between; margin-top:10px;">
        <div class="muted" id="pedidosPaginaInfo"></div>
        <div class="row">
          <button id="pedidosPrev" class="secondary">Anterior</button>
          <button id="pedidosNext" class="secondary">Próxima</button>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <h2>Usuários</h2>
        <div class="row">
          <input id="usrBusca" placeholder="Buscar (nome ou email)" style="min-width:220px;" />
          <button id="btnBuscarUsuarios" class="secondary">Buscar</button>
          <label style="margin:0;">Perfil</label>
          <select id="selFiltroPerfil">
            <option value="">(todos)</option>
            <option value="gestor">gestor</option>
            <option value="equipe">equipe</option>
          </select>
          <button id="btnRecarregarUsuarios" class="secondary">Recarregar</button>
        </div>
      </div>

      <div style="margin: 15px 0; padding: 15px; background: #1e293b; border-radius: 8px;">
        <h3 style="margin: 0 0 15px 0; color: #22c55e;">Criar Novo Usuário</h3>
        <div class="row" style="gap:10px; margin-bottom: 10px; flex-wrap: wrap;">
          <input id="novoNome" placeholder="Nome completo *" style="flex:1; min-width: 200px;" required />
          <input id="novoEmail" placeholder="email@exemplo.com *" type="email" style="flex:1; min-width: 200px;" required />
          <input id="novoSenha" placeholder="Senha (mín. 6 chars) *" type="password" style="flex:1; min-width: 200px;" required />
        </div>
        <div class="row" style="gap:10px; margin-bottom: 10px; flex-wrap: wrap;">
          <select id="novoPerfil" style="flex:1; min-width: 120px;">
            <option value="gestor">Gestor</option>
            <option value="equipe">Equipe</option>
          </select>
          <select id="novoEquipe" style="flex:1; min-width: 150px;">
            <option value="">(sem equipe)</option>
          </select>
          <button id="btnCriarUsuario" style="padding: 10px 20px;">Criar Usuário</button>
        </div>
      </div>
      <div id="statusCriarUsuario" class="muted"></div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Nova Senha</th>
            <th>Perfil</th>
            <th>Equipe</th>
            <th>Ativo</th>
            <th class="right">Ações</th>
          </tr>
        </thead>
        <tbody id="tbodyUsuarios"></tbody>
      </table>
      <div class="row" style="justify-content:space-between; margin-top:10px;">
        <div class="muted" id="usuariosPaginaInfo"></div>
        <div class="row">
          <button id="usuariosPrev" class="secondary">Anterior</button>
          <button id="usuariosNext" class="secondary">Próxima</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/gestor.js"></script>
</body>
</html>
