<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes de Estoque - Nexus Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); }
        .card { border: none; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .estoque-info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin: 15px 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/admin.html">
                <i class="bi bi-box-seam me-2"></i>Nexus Gestão - Estoque
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="movimentacoes.html">Movimentações</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventario.html">Inventário</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Ajustes</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h2 class="mb-4"><i class="bi bi-sliders me-2"></i>Ajuste Manual de Estoque</h2>

                <div class="card">
                    <div class="card-body">
                        <form id="formAjuste">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Produto *</label>
                                <select class="form-select" id="produto_id" required></select>
                            </div>

                            <div id="estoqueAtual" class="estoque-info d-none">
                                <h5 class="mb-3">Informações do Produto</h5>
                                <div class="row">
                                    <div class="col-md-4">
                                        <strong>Estoque Atual:</strong><br>
                                        <span class="h4 text-primary" id="estoqueAtualValor">0</span>
                                        <span id="unidade"></span>
                                    </div>
                                    <div class="col-md-4">
                                        <strong>Estoque Mínimo:</strong><br>
                                        <span class="h5" id="estoqueMinimo">0</span>
                                    </div>
                                    <div class="col-md-4">
                                        <strong>Estoque Máximo:</strong><br>
                                        <span class="h5" id="estoqueMaximo">0</span>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Tipo de Ajuste *</label>
                                    <select class="form-select" id="tipo_ajuste" required>
                                        <option value="">Selecione...</option>
                                        <option value="ENTRADA">Entrada (Adicionar)</option>
                                        <option value="SAIDA">Saída (Remover)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Quantidade *</label>
                                    <input type="number" class="form-control" id="quantidade_ajuste" 
                                           step="0.01" min="0.01" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Motivo *</label>
                                <select class="form-select" id="motivoSelect" onchange="verificarMotivo()">
                                    <option value="">Selecione um motivo...</option>
                                    <option value="Correção de inventário">Correção de inventário</option>
                                    <option value="Produto danificado">Produto danificado</option>
                                    <option value="Produto vencido">Produto vencido</option>
                                    <option value="Erro de lançamento">Erro de lançamento</option>
                                    <option value="Devolução de cliente">Devolução de cliente</option>
                                    <option value="Perda/Roubo">Perda/Roubo</option>
                                    <option value="outro">Outro motivo...</option>
                                </select>
                            </div>

                            <div class="mb-3 d-none" id="motivoOutroDiv">
                                <label class="form-label">Especifique o motivo</label>
                                <input type="text" class="form-control" id="motivoOutro">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Observações</label>
                                <textarea class="form-control" id="observacao" rows="4" 
                                          placeholder="Descreva detalhadamente o motivo do ajuste..."></textarea>
                            </div>

                            <div id="previewAjuste" class="alert alert-info d-none">
                                <h6 class="alert-heading">Resumo do Ajuste:</h6>
                                <div id="resumoAjuste"></div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="button" class="btn btn-primary btn-lg" onclick="realizarAjuste()">
                                    <i class="bi bi-check-circle me-2"></i>Realizar Ajuste
                                </button>
                                <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                                    <i class="bi bi-x-circle me-2"></i>Limpar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Histórico de Ajustes -->
                <div class="card mt-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Últimos Ajustes</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Data</th>
                                        <th>Produto</th>
                                        <th>Tipo</th>
                                        <th>Quantidade</th>
                                        <th>Motivo</th>
                                        <th>Usuário</th>
                                    </tr>
                                </thead>
                                <tbody id="historicoAjustes">
                                    <tr><td colspan="6" class="text-center">Carregando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        // Verificar autenticação - tentar localStorage e sessionStorage
        let token = localStorage.getItem('token') || sessionStorage.getItem('token');
        if (!token) {
            alert('Você precisa fazer login para acessar esta página.');
            window.location.href = '/login.html';
        }

        let produtoSelecionado = null;

        async function carregarProdutos() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/estoque/produtos', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Erro ao carregar produtos');

                const produtos = await response.json();
                
                const select = $('#produto_id');
                select.empty().append('<option value="">Selecione um produto...</option>');
                
                produtos.forEach(produto => {
                    select.append(new Option(
                        `${produto.codigo_principal} - ${produto.descricao} (Estoque: ${produto.estoque_atual})`,
                        produto.id
                    ));
                });
                
                select.select2({ 
                    width: '100%', 
                    placeholder: 'Digite para buscar um produto...'
                });

                select.on('change', function() {
                    const produtoId = $(this).val();
                    if (produtoId) {
                        const produto = produtos.find(p => p.id == produtoId);
                        mostrarEstoqueAtual(produto);
                    } else {
                        document.getElementById('estoqueAtual').classList.add('d-none');
                    }
                });

            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function mostrarEstoqueAtual(produto) {
            produtoSelecionado = produto;
            document.getElementById('estoqueAtual').classList.remove('d-none');
            document.getElementById('estoqueAtualValor').textContent = parseFloat(produto.estoque_atual).toFixed(2);
            document.getElementById('unidade').textContent = produto.unidade || '';
            document.getElementById('estoqueMinimo').textContent = parseFloat(produto.estoque_minimo || 0).toFixed(2);
            document.getElementById('estoqueMaximo').textContent = parseFloat(produto.estoque_maximo || 0).toFixed(2);
        }

        function verificarMotivo() {
            const select = document.getElementById('motivoSelect');
            const divOutro = document.getElementById('motivoOutroDiv');
            
            if (select.value === 'outro') {
                divOutro.classList.remove('d-none');
                document.getElementById('motivoOutro').required = true;
            } else {
                divOutro.classList.add('d-none');
                document.getElementById('motivoOutro').required = false;
            }
        }

        // Preview do ajuste quando campos forem preenchidos
        ['tipo_ajuste', 'quantidade_ajuste'].forEach(id => {
            document.getElementById(id)?.addEventListener('change', atualizarPreview);
        });

        function atualizarPreview() {
            if (!produtoSelecionado) return;

            const tipo = document.getElementById('tipo_ajuste').value;
            const quantidade = parseFloat(document.getElementById('quantidade_ajuste').value || 0);

            if (!tipo || quantidade <= 0) {
                document.getElementById('previewAjuste').classList.add('d-none');
                return;
            }

            const estoqueAtual = parseFloat(produtoSelecionado.estoque_atual);
            const novoEstoque = tipo === 'ENTRADA' 
                ? estoqueAtual + quantidade 
                : estoqueAtual - quantidade;

            const resumo = `
                <strong>Produto:</strong> ${produtoSelecionado.descricao}<br>
                <strong>Estoque Atual:</strong> ${estoqueAtual.toFixed(2)}<br>
                <strong>Ajuste:</strong> ${tipo === 'ENTRADA' ? '+' : '-'}${quantidade.toFixed(2)}<br>
                <strong>Novo Estoque:</strong> ${novoEstoque.toFixed(2)}
                ${novoEstoque < 0 ? '<br><span class="text-danger">⚠️ ATENÇÃO: Estoque ficará negativo!</span>' : ''}
            `;

            document.getElementById('resumoAjuste').innerHTML = resumo;
            document.getElementById('previewAjuste').classList.remove('d-none');
        }

        async function realizarAjuste() {
            try {
                const produtoId = $('#produto_id').val();
                const tipo = document.getElementById('tipo_ajuste').value;
                const quantidade = document.getElementById('quantidade_ajuste').value;
                const motivoSelect = document.getElementById('motivoSelect').value;
                const motivoOutro = document.getElementById('motivoOutro').value;
                const observacao = document.getElementById('observacao').value;

                if (!produtoId || !tipo || !quantidade || !motivoSelect) {
                    alert('Preencha todos os campos obrigatórios');
                    return;
                }

                const motivo = motivoSelect === 'outro' ? motivoOutro : motivoSelect;

                if (!confirm('Confirma o ajuste de estoque?')) {
                    return;
                }

                const token = localStorage.getItem('token');
                const response = await fetch('/api/estoque/ajuste', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        produto_id: produtoId,
                        quantidade_ajuste: quantidade,
                        tipo_ajuste: tipo,
                        motivo: motivo,
                        observacao: observacao
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || 'Erro ao realizar ajuste');
                }

                alert(`✓ ${result.message}\n\nEstoque anterior: ${result.estoque_anterior}\nNovo estoque: ${result.estoque_novo}`);
                limparFormulario();
                carregarHistorico();

            } catch (error) {
                console.error('Erro:', error);
                alert('Erro: ' + error.message);
            }
        }

        function limparFormulario() {
            document.getElementById('formAjuste').reset();
            $('#produto_id').val('').trigger('change');
            document.getElementById('estoqueAtual').classList.add('d-none');
            document.getElementById('previewAjuste').classList.add('d-none');
            document.getElementById('motivoOutroDiv').classList.add('d-none');
            produtoSelecionado = null;
        }

        async function carregarHistorico() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/estoque/relatorio/movimentacoes?tipo=AJUSTE', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Erro ao carregar histórico');

                const movimentacoes = await response.json();
                const tbody = document.getElementById('historicoAjustes');

                if (movimentacoes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nenhum ajuste realizado</td></tr>';
                    return;
                }

                tbody.innerHTML = movimentacoes.slice(0, 10).map(mov => `
                    <tr>
                        <td>${new Date(mov.data_movimentacao).toLocaleString('pt-BR')}</td>
                        <td>
                            <strong>${mov.codigo_principal}</strong><br>
                            <small>${mov.produto_descricao}</small>
                        </td>
                        <td><span class="badge bg-${mov.tipo.includes('ENTRADA') ? 'success' : 'warning'}">${mov.tipo}</span></td>
                        <td>${parseFloat(mov.quantidade).toFixed(2)}</td>
                        <td>${mov.motivo || '-'}</td>
                        <td>${mov.usuario_nome}</td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Erro:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarProdutos();
            carregarHistorico();
        });
    </script>
</body>
</html>
